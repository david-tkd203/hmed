# SonarQube Project Configuration for HMED (Histórico Clínico)

# Identificación del Proyecto
sonar.projectKey=hmed-full
sonar.projectName=HMED - Histórico Clínico
sonar.projectVersion=1.0.0
sonar.projectDescription=Sistema integral de gestión de historiales clínicos con análisis de documentos médicos

# Fuentes a analizar
sonar.sources=backend,frontend
sonar.sourceEncoding=UTF-8

# Exclusiones
sonar.exclusions=**/node_modules/**,**/__pycache__/**,**/migrations/**,**/venv/**,.venv/**,build/**,dist/**

# Backend (Python/Django)
sonar.python.version=3.9
sonar.python.django.enabled=true

# Frontend (JavaScript/React)
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.typescript.lcov.reportPaths=frontend/coverage/lcov.info

# Cobertura de código
sonar.coverage.exclusions=**/test_*.py,**/*.spec.js,**/*.test.js,**/tests/**,**/node_modules/**

# Issues (Problemas de código)
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=javascript:S101
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.js

# URLs (importante: cambiar si SonarQube está en otro servidor)
sonar.host.url=http://localhost:9000
sonar.login=admin
sonar.password=admin

# Exclusiones adicionales
sonar.exclusions=**/migrations/**,**/node_modules/**,**/dist/**,**/build/**,**/.venv/**,**/venv/**,.github/**
