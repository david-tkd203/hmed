# SonarQube Análisis de Código - Histórico Clínico

# Identificación del proyecto
sonar.projectKey=historico-clinico
sonar.projectName=Histórico Clínico - Sistema Médico
sonar.projectVersion=1.0.0
sonar.projectDescription=Aplicación full-stack para gestión de historiales clínicos

# Rutas de código fuente
sonar.sources=backend/registros,frontend/src

# Backend (Python/Django)
sonar.python.version=3.11
sonar.python.pylint=/usr/local/bin/pylint

# Frontend (JavaScript/React)
sonar.javascript.file.suffixes=.js,.jsx

# Exclusiones
sonar.exclusions=**/migrations/**,**/tests/**,**/node_modules/**,**/__pycache__/**,**/.git/**

# Calidad de código
sonar.qualitygate.wait=true

# Security hotspots
sonar.security.hotspots.skip=false

# Cobertura (opcional, si agregan tests con coverage)
sonar.coverage.exclusions=**/tests/**,**/migrations/**

# URL del servidor SonarQube (dentro Docker)
sonar.host.url=http://sonarqube:9000
sonar.login=admin
sonar.password=admin
