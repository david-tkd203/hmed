version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=hmed_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secret_pass
    ports:
      - "5432:5432"
    networks:
      - hmed_network

  web:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - DATABASE_URL=postgres://admin:secret_pass@db:5432/hmed_db
      - PYTHONUNBUFFERED=1
      - AI_SERVICE_URL=http://ai:9000
    depends_on:
      - db
      - ai
    networks:
      - hmed_network

  ai:
    build: ./backend
    container_name: hmed_ai_service
    command: >
      sh -c "python -c '
      import logging
      import sys
      logging.basicConfig(level=logging.INFO)
      logger = logging.getLogger(__name__)
      try:
        from registros.analysis_service import get_analyzer
        analyzer = get_analyzer()
        logger.info(\"✓ AI Service initialized and ready\")
        logger.info(f\"  Device: {analyzer.device}\")
        logger.info(f\"  Model: MedSigLIP (google/medsiglip-448)\")
        # Keep container running
        import time
        while True: time.sleep(1)
      except Exception as e:
        logger.error(f\"✗ AI Service failed: {str(e)}\")
        sys.exit(1)
      '"
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgres://admin:secret_pass@db:5432/hmed_db
    depends_on:
      - db
    networks:
      - hmed_network
    healthcheck:
      test: ["CMD", "python", "-c", "from registros.analysis_service import get_analyzer; get_analyzer()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build: ./frontend
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - web
    networks:
      - hmed_network

networks:
  hmed_network:
    driver: bridge

volumes:
  postgres_data: