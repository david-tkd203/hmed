version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=hmed_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secret_pass
    ports:
      - "5432:5432"
    networks:
      - hmed_network

  ai:
    build:
      context: ./backend
      dockerfile: Dockerfile.ai
    ports:
      - "8001:8001"
    environment:
      - PYTHONUNBUFFERED=1
      - AI_SERVICE_PORT=8001
    networks:
      - hmed_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  web:
    build: ./backend
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - DATABASE_URL=postgres://admin:secret_pass@db:5432/hmed_db
      - PYTHONUNBUFFERED=1
      - AI_SERVICE_URL=http://ai:8001
    depends_on:
      - db
      - ai
    networks:
      - hmed_network

  frontend:
    build: ./frontend
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - web
    networks:
      - hmed_network

networks:
  hmed_network:
    driver: bridge

volumes:
  postgres_data: