version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=hmed_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secret_pass
    ports:
      - "5432:5432"
    networks:
      - hmed_network

  web:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - DATABASE_URL=postgres://admin:secret_pass@db:5432/hmed_db
    depends_on:
      - db
    networks:
      - hmed_network

  frontend:
    build: ./frontend
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://web:8000
    depends_on:
      - web
    networks:
      - hmed_network

  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://db:5432/sonarqube
      - SONAR_JDBC_USERNAME=admin
      - SONAR_JDBC_PASSWORD=secret_pass
      - SONAR_JDBC_DRIVER=org.postgresql.Driver
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
    depends_on:
      - db
    networks:
      - hmed_network

networks:
  hmed_network:
    driver: bridge

volumes:
  postgres_data:
  sonarqube_data:
  sonarqube_logs: