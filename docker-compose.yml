version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      - POSTGRES_DB=hmed_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secret_pass
    ports:
      - "5432:5432"
    networks:
      - hmed_network

  ai:
    build:
      context: ./backend
      dockerfile: Dockerfile.ai
    ports:
      - "8001:8001"
    environment:
      - PYTHONUNBUFFERED=1
      - AI_SERVICE_PORT=8001
    networks:
      - hmed_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  web:
    build: ./backend
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - DATABASE_URL=postgres://admin:secret_pass@db:5432/hmed_db
      - PYTHONUNBUFFERED=1
      - AI_SERVICE_URL=http://ai:8001
    depends_on:
      - db
      - ai
    networks:
      - hmed_network

  frontend:
    build: ./frontend
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - web
    networks:
      - hmed_network

  sonarqube:
    image: sonarqube:latest
    ports:
      - "9000:9000"
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://db:5432/sonarqube
      - SONAR_JDBC_USERNAME=sonar_user
      - SONAR_JDBC_PASSWORD=sonar_password
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLED=true
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    depends_on:
      - db
    networks:
      - hmed_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/api/system/health"]
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  hmed_network:
    driver: bridge

volumes:
  postgres_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs: