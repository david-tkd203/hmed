services:
  db:
    image: postgres:15
    command: ["postgres", "-c", "max_connections=200"]
    volumes:
      - postgres_data:/var/lib/postgresql/data/
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    shm_size: 512mb
    environment:
      - POSTGRES_DB=${DB_NAME:-hmed_db}
      - POSTGRES_USER=${DB_USER:-admin}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-secret_pass}
    ports:
      - "5432:5432"
    networks:
      - hmed_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d hmed_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  ai:
    build:
      context: ./backend
      dockerfile: Dockerfile.ai
    ports:
      - "8001:8001"
    environment:
      - PYTHONUNBUFFERED=1
      - AI_SERVICE_PORT=8001
    networks:
      - hmed_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  web:
    build: ./backend
    command: bash -c "chmod +x /app/entrypoint.sh && /app/entrypoint.sh"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DEBUG=${DEBUG:-True}
      - SECRET_KEY=${SECRET_KEY:-CHANGE_ME_IN_PRODUCTION}
      - DB_ENGINE=${DB_ENGINE:-django.db.backends.postgresql}
      - DB_NAME=${DB_NAME:-hmed_db}
      - DB_USER=${DB_USER:-admin}
      - DB_PASSWORD=${DB_PASSWORD:-secret_pass}
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-5432}
      - PYTHONUNBUFFERED=1
      - AI_SERVICE_URL=http://ai:8001
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,web,frontend,host.docker.internal}
      - TEST_USERNAME=${TEST_USERNAME:-testuser}
      - TEST_PASSWORD=${TEST_PASSWORD:-changeme}
      - TEST_EMAIL=${TEST_EMAIL:-test@example.local}
    depends_on:
      db:
        condition: service_healthy
      ai:
        condition: service_healthy
    networks:
      - hmed_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health/ || exit 0"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 3G
        reservations:
          cpus: '1'
          memory: 2G

  frontend:
    build: ./frontend
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    depends_on:
      - web
    networks:
      - hmed_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5173/ || exit 0"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 30s

  sonarqube:
    image: sonarqube:latest
    ports:
      - "9000:9000"
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://db:5432/sonarqube
      - SONAR_JDBC_USERNAME=${DB_USER:-admin}
      - SONAR_JDBC_PASSWORD=${DB_PASSWORD:-secret_pass}
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLED=true
      - SONAR_Java_javaVersion=17
      - SONAR_ES_BOOTSTRAP_MEMORY_LOCK=false
      - SONAR_LOG_LEVEL=INFO
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2.5G
        reservations:
          cpus: '1'
          memory: 1.5G
    networks:
      - hmed_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/api/system/health || exit 0"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 180s
    profiles:
      - sonarqube

networks:
  hmed_network:
    driver: bridge

volumes:
  postgres_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs: