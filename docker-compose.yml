version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=hmed_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secret_pass
    networks:
      - hmed_network

  web:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - DATABASE_URL=postgres://admin:secret_pass@db:5432/hmed_db
    depends_on:
      - db
    networks:
      - hmed_network

networks:
  hmed_network:
    driver: bridge

volumes:
  postgres_data: